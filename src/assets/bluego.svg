<svg xmlns="http://www.w3.org/2000/svg" width="360" height="96" viewBox="0 0 360 96" role="img" aria-labelledby="title desc">
  <title id="title">Bluetick logo</title>
  <desc id="desc">Rounded blue badge with a white B and a blue wordmark.</desc>
  <defs>
    <linearGradient id="badgeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="textBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="80" height="80" rx="20" fill="url(#badgeBlue)" />
  <text x="48" y="62" text-anchor="middle" font-size="52" font-family="Poppins, Arial, sans-serif" font-weight="700" fill="#ffffff">B</text>
  <text x="106" y="62" font-size="44" font-family="Baloo 2, Poppins, Arial, sans-serif" font-weight="700" fill="url(#textBlue)" letter-spacing="1.2">BLUETICK</text>
</svg>
